name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust (host) ─────────────────────────────────────────────────────────────
  rust:
    name: Rust (check / test / clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  # ─── Security audit ──────────────────────────────────────────────────────────
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  # ─── Cross-compilation: iOS ──────────────────────────────────────────────────
  # Checks that the FFI crate compiles for the primary iOS target.
  # Requires the aarch64-apple-ios target and the Xcode SDK; only runs on macOS.
  cross-ios:
    name: Cross-compile (aarch64-apple-ios)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ios-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check (aarch64-apple-ios)
        run: cargo check --workspace --target aarch64-apple-ios

      - name: cargo check (iOS Simulator arm64)
        run: cargo check --workspace --target aarch64-apple-ios-sim

  # ─── Cross-compilation: Android ──────────────────────────────────────────────
  # Checks that the FFI crate compiles for the primary Android ABI targets.
  cross-android:
    name: Cross-compile (Android ABIs)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --locked

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cross check (${{ matrix.target }})
        run: cross check --workspace --target ${{ matrix.target }}

  # ─── TypeScript ─────────────────────────────────────────────────────────────
  typescript:
    name: TypeScript (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck @lokal-ml/react-native
        run: pnpm --filter @lokal-ml/react-native typecheck

      - name: Typecheck @lokal-ml/taladb-plugin
        run: pnpm --filter @lokal-ml/taladb-plugin typecheck
