[package]
name        = "lokal-ml-core"
version.workspace    = true
edition.workspace    = true
authors.workspace    = true
license.workspace    = true
description = "Lokal ML core: hardware profiler, resumable model downloader, and GGUF inference engine"
repository  = "https://github.com/thinkgrid-labs/lokal-ml"

[dependencies]
# Async runtime
tokio      = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time", "fs", "io-util"] }

# Async HTTP for resumable model downloads (rustls — no OpenSSL dep on mobile)
reqwest    = { version = "0.12", default-features = false, features = ["stream", "json", "rustls-tls"] }

# llama.cpp GGUF execution (Metal on iOS/macOS, NEON on Android ARM64)
llama-cpp-2 = "0.1"

# System hardware introspection (RAM, CPU arch)
sysinfo    = "0.30"

# SHA-256 integrity verification for downloaded model files
sha2       = "0.10"
hex        = "0.4"

# Async streaming / channel
futures    = "0.3"
tokio-stream = "0.1"

# Serialisation for model registry manifest
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror  = "1.0"
anyhow     = "1.0"

# Logging
tracing    = "0.1"

[dev-dependencies]
tempfile   = "3.10"
tokio      = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
wiremock   = "0.6"
