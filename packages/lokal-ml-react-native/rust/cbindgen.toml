language = "C"
include_guard = "LOKAL_ML_H"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen — do not edit manually. */"
tab_width = 2
documentation = true
documentation_style = "c99"

[export]
# lokal_ prefix already present on all symbols — no extra prefix needed.
prefix = ""

[parse]
parse_deps = false
